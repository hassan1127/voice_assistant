

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #a78bfa; }
        p.subtitle { color: #888; margin-bottom: 40px; }
        .mic-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #7c3aed;
            border: none;
            cursor: pointer;
            font-size: 2rem;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .mic-btn:hover { background: #6d28d9; transform: scale(1.05); }
        .mic-btn.listening { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
        }
        button.send-btn {
            padding: 12px 20px;
            border-radius: 10px;
            background: #7c3aed;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
        .response-box {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            min-height: 80px;
            text-align: left;
            color: #ccc;
            line-height: 1.6;
        }
        .status { color: #a78bfa; margin-bottom: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎙️ Voice Assistant</h1>
    <p class="subtitle">Ask me anything — by voice or text</p>

    <button class="mic-btn" id="micBtn" title="Click to speak">🎤</button>

    <div class="input-row">
        <input type="text" id="textInput" placeholder="Or type your question here..." />
        <button class="send-btn" onclick="sendText()">Send</button>
    </div>

    <div class="response-box">
        <div class="status" id="status">Ready</div>
        <div id="responseText">Your answer will appear here...</div>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('status');
    const responseText = document.getElementById('responseText');
    const textInput = document.getElementById('textInput');

    // Speech recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';

    micBtn.addEventListener('click', () => {
        recognition.start();
        micBtn.classList.add('listening');
        status.textContent = 'Listening...';
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        textInput.value = transcript;
        micBtn.classList.remove('listening');
        sendMessage(transcript);
    };

    recognition.onerror = () => {
        micBtn.classList.remove('listening');
        status.textContent = 'Error with mic. Try typing instead.';
    };

    function sendText() {
        const message = textInput.value.trim();
        if (message) sendMessage(message);
    }

    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendText();
    });

    async function sendMessage(message) {
        status.textContent = 'Thinking...';
        responseText.textContent = '';

        const res = await fetch('/ask/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });

        const data = await res.json();
        responseText.textContent = data.answer;
        status.textContent = 'Speaking...';

        // Play audio

        // Play audio
        const audio = new Audio('data:audio/mp3;base64,' + data.audio);
        audio.play();
        audio.onended = () => { status.textContent = 'Ready'; };
    }

</script>
</body>
</html>
